/* ─── STARS ─────────────────────────────────────────────────────────── */
const STARS=Array.from({length:220},(_,i)=>({
  x:((Math.sin(i*137.508)*0.5+0.5)),
  y:((Math.sin(i*73.1+1.7)*0.5+0.5)),
  r:i%7===0?1.5:i%3===0?0.8:0.45,
  a:(Math.sin(i*53.3)*0.35+0.65)*0.38
}));

/* ─── 3-D PROJECTION ─────────────────────────────────────────────────── */
function proj(lat,lng,ry,rx,R){
  const phi=(90-lat)*Math.PI/180, th=(lng+180)*Math.PI/180;
  let x=Math.sin(phi)*Math.cos(th), y=Math.cos(phi), z=Math.sin(phi)*Math.sin(th);
  const cy=Math.cos(ry),sy=Math.sin(ry); [x,z]=[x*cy-z*sy,x*sy+z*cy];
  const cx2=Math.cos(rx),sx=Math.sin(rx); [y,z]=[y*cx2-z*sx,y*sx+z*cx2];
  return {sx:x*R, sy:-y*R, z, vis:z>0};
}

/* ─── PHOTOREALISTIC GLOBE CANVAS ───────────────────────────────────── */
function GlobeCanvas({year,selId,hovId,onSelect,onHover}){
  const ref=useRef(null);
  const state=useRef({ry:0.35,rx:0.08,auto:true,drag:false,lx:0,ly:0,moved:false});
  const rafId=useRef(null);
  const autoTimer=useRef(null);

  /* hit-test spike tips */
  const hitTest=useCallback((mx,my,R,cx,cy)=>{
    let best=null,bd=44;
    Object.entries(REGIONS).forEach(([id,r])=>{
      const yr=r.yearly[year]; if(!yr) return;
      const p=proj(r.la,r.lo,state.current.ry,state.current.rx,R);
      if(!p.vis) return;
      const h=(yr.risk/100)*72+10, nl=Math.hypot(p.sx,p.sy)||1;
      const tx=cx+p.sx+(p.sx/nl)*h, ty=cy+p.sy+(p.sy/nl)*h;
      const d=Math.hypot(mx-tx,my-ty);
      if(d<bd){bd=d;best=id;}
    });
    return best;
  },[year]);

  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext('2d'); let alive=true;

    function drawFrame(){
      if(!alive) return;
      const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
      const R=Math.min(W,H)*0.42;
      const {ry,rx}=state.current;

      ctx.clearRect(0,0,W,H);

      /* deep space bg */
      const bg=ctx.createRadialGradient(W*0.35,H*0.28,0,W*0.5,H*0.5,W*0.75);
      bg.addColorStop(0,'#030d1e'); bg.addColorStop(0.6,'#020810'); bg.addColorStop(1,'#010508');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

      /* stars */
      STARS.forEach(s=>{
        ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(210,228,255,${s.a})`; ctx.fill();
      });

      /* outer atmosphere haze */
      const atm=ctx.createRadialGradient(cx,cy,R*0.92,cx,cy,R*1.18);
      atm.addColorStop(0,'rgba(80,160,255,0.18)'); atm.addColorStop(0.6,'rgba(40,100,200,0.07)'); atm.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(cx,cy,R*1.18,0,Math.PI*2); ctx.fillStyle=atm; ctx.fill();

      /* ── OCEAN BASE (deep blue, realistic) ── */
      const ocean=ctx.createRadialGradient(cx-R*0.32,cy-R*0.28,R*0.04,cx,cy,R);
      ocean.addColorStop(0,'#1b5e99'); ocean.addColorStop(0.38,'#0c3d6e'); ocean.addColorStop(0.72,'#082c52'); ocean.addColorStop(1,'#041b34');
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=ocean; ctx.fill();

      /* ── LATITUDE / LONGITUDE GRID ── */
      ctx.save(); ctx.strokeStyle='rgba(100,180,255,0.055)'; ctx.lineWidth=0.5;
      for(let lat=-75;lat<=75;lat+=15){
        ctx.beginPath(); let f=true;
        for(let lo=-180;lo<=180;lo+=4){
          const p=proj(lat,lo,ry,rx,R); if(!p.vis){f=true;continue;}
          f?ctx.moveTo(cx+p.sx,cy+p.sy):ctx.lineTo(cx+p.sx,cy+p.sy); f=false;
        } ctx.stroke();
      }
      for(let lo=-180;lo<180;lo+=15){
        ctx.beginPath(); let f=true;
        for(let lat=-85;lat<=85;lat+=4){
          const p=proj(lat,lo,ry,rx,R); if(!p.vis){f=true;continue;}
          f?ctx.moveTo(cx+p.sx,cy+p.sy):ctx.lineTo(cx+p.sx,cy+p.sy); f=false;
        } ctx.stroke();
      }
      ctx.restore();

      /* ── CONTINENTS (filled polygons) ── */
      GEO.forEach(geo=>{
        const pts=geo.pts.map(([la,lo])=>{const p=proj(la,lo,ry,rx,R);return{...p,px:cx+p.sx,py:cy+p.sy};});
        /* check centroid visibility */
        const ctr=proj(geo.lx,geo.ly,ry,rx,R);
        if(ctr.z<-0.35) return; // fully on back
        ctx.beginPath(); let f=true;
        pts.forEach(p=>{
          if(!p.vis){f=true;return;}
          f?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py); f=false;
        });
        ctx.closePath();
        /* land gradient — green→brown tones */
        const lg=ctx.createRadialGradient(cx-R*0.1,cy-R*0.08,0,cx,cy,R*1.1);
        lg.addColorStop(0,geo.fill+'ee'); lg.addColorStop(0.6,geo.fill+'cc'); lg.addColorStop(1,geo.fill+'88');
        ctx.fillStyle=lg; ctx.fill();
        ctx.strokeStyle=geo.stroke; ctx.lineWidth=0.8; ctx.stroke();
      });

      /* ── ICE CAPS ── */
      [88,-88].forEach(lat=>{
        ctx.beginPath(); let f=true;
        for(let lo=-180;lo<=180;lo+=5){
          const p=proj(lat,lo,ry,rx,R); if(!p.vis){f=true;continue;}
          f?ctx.moveTo(cx+p.sx,cy+p.sy):ctx.lineTo(cx+p.sx,cy+p.sy); f=false;
        }
        ctx.strokeStyle='rgba(230,245,255,0.65)'; ctx.lineWidth=3; ctx.stroke();
      });
      /* polar caps fill */
      [89,-89].forEach(lat=>{
        ctx.beginPath(); let f=true;
        for(let lo=-180;lo<=180;lo+=8){
          const p=proj(lat,lo,ry,rx,R); if(!p.vis){f=true;continue;}
          f?ctx.moveTo(cx+p.sx,cy+p.sy):ctx.lineTo(cx+p.sx,cy+p.sy); f=false;
        }
        ctx.closePath(); ctx.fillStyle='rgba(220,238,255,0.22)'; ctx.fill();
      });

      /* ── CONTINENT LABELS ── */
      GEO.filter(g=>['namerica','samerica','europe','africa','asia','australia'].includes(g.id)).forEach(geo=>{
        const p=proj(geo.lx,geo.ly,ry,rx,R);
        if(p.z<0.12) return;
        const op=Math.min(1,(p.z-0.12)*2.5)*0.92;
        const x=cx+p.sx, y=cy+p.sy;
        ctx.save(); ctx.globalAlpha=op;
        /* shadow */
        ctx.font='bold 8.5px "DM Sans",system-ui';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='rgba(2,10,20,0.7)';
        ctx.fillText(geo.label.toUpperCase(),x+1,y+1);
        /* label */
        ctx.fillStyle='rgba(220,240,255,0.95)';
        ctx.fillText(geo.label.toUpperCase(),x,y);
        ctx.restore();
      });

      /* ── CITY DOTS ── */
      CITIES.forEach(c=>{
        const p=proj(c.la,c.lo,ry,rx,R); if(!p.vis||p.z<0.15) return;
        const op=Math.min(1,(p.z-0.15)*3)*0.7;
        ctx.save(); ctx.globalAlpha=op;
        ctx.beginPath(); ctx.arc(cx+p.sx,cy+p.sy,1.5,0,Math.PI*2);
        ctx.fillStyle='rgba(255,240,160,0.9)'; ctx.fill();
        ctx.font='6px "DM Sans",system-ui'; ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,240,160,0.75)';
        ctx.fillText(c.n,cx+p.sx+3,cy+p.sy);
        ctx.restore();
      });

      /* ── RISK SPIKES ── */
      Object.entries(REGIONS).forEach(([id,reg])=>{
        const yr=reg.yearly[year]; if(!yr) return;
        const col=rc(yr.risk);
        const p=proj(reg.la,reg.lo,ry,rx,R);
        if(!p.vis||p.z<0.05) return;
        const op=Math.min(1,(p.z-0.05)*4);
        const sH=(yr.risk/100)*72+8;
        const nl=Math.hypot(p.sx,p.sy)||1;
        const nx=p.sx/nl, ny=p.sy/nl;
        const bx=cx+p.sx, by=cy+p.sy;
        const tx=bx+nx*sH, ty=by+ny*sH;
        const active=(id===selId||id===hovId);

        ctx.save(); ctx.globalAlpha=op*(active?1:0.82);
        if(active){ctx.shadowColor=col;ctx.shadowBlur=22;}

        /* spike gradient line */
        const sg=ctx.createLinearGradient(bx,by,tx,ty);
        sg.addColorStop(0,col+'28'); sg.addColorStop(1,col);
        ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty);
        ctx.strokeStyle=sg; ctx.lineWidth=active?3.5:2;
        ctx.lineCap='round'; ctx.stroke();

        /* spike tip */
        ctx.shadowBlur=active?24:8;
        ctx.beginPath(); ctx.arc(tx,ty,active?5.5:3.5,0,Math.PI*2);
        ctx.fillStyle=active?'#fff':col; ctx.fill();

        /* pulse ring */
        if(active){
          ctx.globalAlpha=0.28*op;
          ctx.strokeStyle=col; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.arc(tx,ty,10,0,Math.PI*2); ctx.stroke();
          ctx.beginPath(); ctx.arc(tx,ty,16,0,Math.PI*2); ctx.globalAlpha=0.12*op; ctx.stroke();
        }

        /* risk % label */
        if(active||yr.risk>=62){
          const lx2=tx+nx*13, ly2=ty+ny*13;
          ctx.globalAlpha=op*(active?1:0.85);
          ctx.font=`bold ${active?11:9}px "DM Sans",monospace`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          const tw=ctx.measureText(`${yr.risk}%`).width;
          ctx.fillStyle='rgba(2,10,20,0.78)';
          ctx.beginPath(); ctx.roundRect(lx2-tw/2-4,ly2-7,tw+8,14,3); ctx.fill();
          ctx.fillStyle=active?'#fff':col;
          ctx.fillText(`${yr.risk}%`,lx2,ly2);
        }

        /* region name on active */
        if(active){
          const lx3=tx+nx*28, ly3=ty+ny*28;
          ctx.globalAlpha=0.9*op;
          ctx.font=`600 9px "DM Sans",system-ui`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          const tw2=ctx.measureText(reg.name).width;
          ctx.fillStyle='rgba(2,10,20,0.82)';
          ctx.beginPath(); ctx.roundRect(lx3-tw2/2-5,ly3-7,tw2+10,14,3); ctx.fill();
          ctx.fillStyle='#fff'; ctx.fillText(reg.name,lx3,ly3);
        }

        ctx.restore();
      });

      /* ── GLOBE RIM ── */
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
      ctx.strokeStyle='rgba(99,179,237,0.14)'; ctx.lineWidth=1.5; ctx.stroke();

      /* ── SPECULAR HIGHLIGHT ── */
      const hl=ctx.createRadialGradient(cx-R*0.38,cy-R*0.32,0,cx-R*0.18,cy-R*0.14,R*0.55);
      hl.addColorStop(0,'rgba(255,255,255,0.1)'); hl.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=hl; ctx.fill();

      /* limb darkening */
      const ld=ctx.createRadialGradient(cx,cy,R*0.6,cx,cy,R);
      ld.addColorStop(0,'rgba(0,0,0,0)'); ld.addColorStop(1,'rgba(0,0,0,0.38)');
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=ld; ctx.fill();

      if(state.current.auto) state.current.ry+=0.0025;
      rafId.current=requestAnimationFrame(drawFrame);
    }

    drawFrame();
    return()=>{alive=false;cancelAnimationFrame(rafId.current);};
  },[year,selId,hovId]);

  function getXY(e){
    const r=ref.current.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return{
      x:(s.clientX-r.left)*(ref.current.width/r.width),
      y:(s.clientY-r.top)*(ref.current.height/r.height),
      cx:ref.current.width/2, cy:ref.current.height/2,
      R:Math.min(ref.current.width,ref.current.height)*0.42
    };
  }
  function onDown(e){const{x,y}=getXY(e);state.current={...state.current,drag:true,lx:x,ly:y,moved:false,auto:false};clearTimeout(autoTimer.current);}
  function onMove(e){
    const{x,y,cx,cy,R}=getXY(e);
    if(state.current.drag){
      state.current.ry+=(x-state.current.lx)*0.007;
      state.current.rx=Math.max(-1.1,Math.min(1.1,state.current.rx+(y-state.current.ly)*0.007));
      state.current.lx=x; state.current.ly=y; state.current.moved=true;
    } else {
      const f=hitTest(x,y,R,cx,cy);
      if(f!==hovId) onHover(f);
    }
  }
  function onUp(e){
    if(!state.current.drag) return;
    if(!state.current.moved){
      const{x,y,cx,cy,R}=getXY(e);
      const f=hitTest(x,y,R,cx,cy);
      onSelect(f===selId?null:f);
    }
    state.current.drag=false;
    autoTimer.current=setTimeout(()=>{state.current.auto=true;},4000);
  }

  return <canvas ref={ref} width={530} height={530}
    style={{display:'block',width:'100%',height:'100%',cursor:hovId?'pointer':'grab'}}
    onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
    onMouseLeave={()=>onHover(null)}
    onTouchStart={e=>{e.preventDefault();onDown(e);}}
    onTouchMove={e=>{e.preventDefault();onMove(e);}}
    onTouchEnd={onUp}/>;
}

    const col=rc(yr.risk), net=(yr.displaced-yr.newRoles).toFixed(2);
    const allY=Object.keys(reg.yearly).map(Number).sort((a,b)=>a-b);
    return <div style={{padding:10,height:'100%',overflowY:'auto',background:P.bg2}}>
      <div style={{fontSize:7,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:P.text3,marginBottom:7}}>Region · {year}</div>
      <div style={{fontFamily:'DM Serif Display,Georgia,serif',fontSize:15,color:P.text,marginBottom:3}}>{reg.name}</div>
      <div style={{display:'inline-block',padding:'2px 8px',borderRadius:10,fontSize:7.5,fontWeight:700,background:`${col}15`,color:col,border:`1px solid ${col}30`,marginBottom:7}}>{rl(yr.risk)} · {yr.risk}%</div>
      <div style={{height:4,background:'rgba(255,255,255,0.07)',borderRadius:3,overflow:'hidden',marginBottom:9}}>
        <div style={{height:'100%',width:`${yr.risk}%`,background:col,borderRadius:3,transition:'width 0.5s'}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:8}}>
        {[['At Risk',`${yr.displaced}M`,P.red],['New Roles',`${yr.newRoles}M`,P.green],['Gap',`−${net}M`,P.orange],['Exposure',`${yr.auto}%`,P.sky]].map(([l,v,c])=>(
          <div key={l} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:6,padding:'5px 7px'}}>
            <div style={{fontSize:7,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:P.text3,marginBottom:1}}>{l}</div>
            <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
          </div>))}
      </div>
      <div style={{fontSize:7,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:P.text3,marginBottom:4}}>2025–2035</div>
      <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:6,padding:'5px 4px',display:'flex',gap:1,marginBottom:8}}>
        {allY.map(y=>{const d=reg.yearly[y],c=rc(d.risk),sel=y===year;return(
          <div key={y} style={{flex:'0 0 auto',textAlign:'center',minWidth:16}}>
            <div style={{height:26,display:'flex',alignItems:'flex-end',justifyContent:'center',marginBottom:1}}>
              <div style={{width:9,height:`${(d.risk/100)*26}px`,background:c,opacity:sel?1:0.22,borderRadius:'1px 1px 0 0',boxShadow:sel?`0 0 6px ${c}`:''}}/>
            </div>
            <div style={{fontSize:4.5,color:sel?P.sky:P.text3,fontWeight:sel?700:400}}>{y}</div>
          </div>);})}
      </div>
      <div style={{fontSize:7,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:P.text3,marginBottom:4}}>Key Sectors</div>
      {reg.sectors.map(s=><div key={s} style={{fontSize:8.5,color:P.text2,padding:'2px 0',borderBottom:`1px solid ${P.border2}`}}>→ {s}</div>)}
    </div>;
  }
  const sorted=Object.entries(REGIONS).sort((a,b)=>b[1].yearly[year].risk-a[1].yearly[year].risk);
  return <div style={{padding:10,height:'100%',overflowY:'auto',background:P.bg2}}>
    <div style={{fontSize:7,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:P.text3,marginBottom:7}}>Exposure Index · {year}</div>
    {sorted.map(([rid,r])=>{
      const yr=r.yearly[year],c=rc(yr.risk),isO=open.has(rid);
      const cts=(COUNTRIES[rid]||[]).sort((a,b)=>(b.y[year]||0)-(a.y[year]||0));
      return <div key={rid} style={{marginBottom:3,background:P.card,border:`1px solid ${P.border}`,borderRadius:7,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 7px',cursor:'pointer'}} onClick={()=>setOpen(pv=>{const s=new Set(pv);s.has(rid)?s.delete(rid):s.add(rid);return s;})}>
          <div style={{width:6,height:6,borderRadius:'50%',background:c,flexShrink:0,boxShadow:`0 0 4px ${c}55`}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,fontWeight:600,color:P.text}}>{r.name}</div>
            <div style={{height:2,background:'rgba(255,255,255,0.07)',borderRadius:2,overflow:'hidden',marginTop:2}}><div style={{height:'100%',width:`${yr.risk}%`,background:c,borderRadius:2}}/></div>
          </div>
          <div style={{textAlign:'right'}}><div style={{fontSize:10,fontWeight:700,color:c}}>{yr.risk}%</div><div style={{fontSize:7,color:P.red}}>{yr.displaced}M</div></div>
          <div style={{fontSize:7,color:P.text3,transition:'transform 0.2s',transform:isO?'rotate(90deg)':'none'}}>▶</div>
        </div>
        {isO&&<div style={{borderTop:`1px solid ${P.border}`,background:'rgba(0,0,0,0.2)'}}>
          {cts.map(ct=>{const cr=ct.y[year]||0,cc=rc(cr);return(
            <div key={ct.n} style={{display:'flex',alignItems:'center',gap:4,padding:'3.5px 7px',borderBottom:`1px solid ${P.border2}`}}>
              <span style={{fontSize:10}}>{ct.f}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:8.5,fontWeight:600,color:P.text}}>{ct.n}</div>
                <div style={{height:2,background:'rgba(255,255,255,0.07)',borderRadius:2,overflow:'hidden',marginTop:1.5}}><div style={{height:'100%',width:`${cr}%`,background:cc,borderRadius:2}}/></div>
              </div>
              <div style={{fontSize:9,fontWeight:700,color:cc,minWidth:25,textAlign:'right'}}>{cr}%</div>
            </div>);})}
        </div>}
      </div>;})}
  </div>;
}

    {n:'Data Entry',c:'#fc8181',vals:[42,44,47,50,48,47,49,51,53,53,49,50,47,38,29,19]},
    {n:'Customer Service',c:'#f6ad55',vals:[28,30,33,36,34,34,36,39,42,44,39,42,41,34,26,17]},
    {n:'Gig Delivery',c:'#f6e05e',vals:[0.5,0.8,1.2,2.1,3.8,5.4,8.2,12,18,28,32,38,43,36,24,15]},
    {n:'Construction Labour',c:'#b794f4',vals:[38,39,40,43,40,39,41,45,48,52,49,51,53,46,36,25]},
    {n:'AI/ML Roles',c:'#68d391',vals:[0,0,0.1,0.2,0.4,0.8,1.8,3.2,5.8,10,16,25,34,47,58,68]},
    {n:'Space Industry',c:'#4fd1c5',vals:[0.1,0.1,0.2,0.3,0.4,0.6,0.9,1.4,2.1,3.2,4.8,7.2,11,16,25,36]},
    {n:'Construction Robotics',c:'#63b3ed',vals:[0,0,0,0.1,0.2,0.4,0.7,1.2,2.1,3.8,6.4,11,18,28,40,54]},
  ];
  const years=[2000,2002,2004,2006,2008,2010,2012,2014,2016,2018,2020,2022,2024,2026,2028,2030];
  const [active,setActive]=useState(new Set(sectors.map(s=>s.n)));
  const togS=n=>setActive(p=>{const s=new Set(p);s.has(n)?(s.size>1&&s.delete(n)):s.add(n);return s;});
  const canRef=useRef(null);
  useEffect(()=>{
    const canvas=canRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
    const PAD={t:28,r:16,b:38,l:48};
    const CW=W-PAD.l-PAD.r, CH=H-PAD.t-PAD.b;
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#040d1a'; ctx.fillRect(0,0,W,H);
    const maxV=Math.max(...sectors.flatMap(s=>s.vals))*1.1;
    for(let i=0;i<=4;i++){
      const y=PAD.t+CH-(i/4)*CH;
      ctx.strokeStyle='rgba(99,179,237,0.07)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+CW,y); ctx.stroke();
      ctx.fillStyle='rgba(126,170,210,0.5)'; ctx.font='8px monospace'; ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillText(((i/4)*maxV).toFixed(0)+'M',PAD.l-4,y);
    }
    const pi=years.indexOf(2024);
    if(pi>=0){
      const px=PAD.l+(pi/(years.length-1))*CW;
      ctx.fillStyle='rgba(246,224,94,0.05)'; ctx.fillRect(px,PAD.t,PAD.l+CW-px,CH);
      ctx.strokeStyle='rgba(246,224,94,0.3)'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(px,PAD.t); ctx.lineTo(px,PAD.t+CH); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='rgba(246,224,94,0.6)'; ctx.font='7px monospace'; ctx.textAlign='center'; ctx.fillText('NOW ►',px,PAD.t-4);
    }
    years.forEach((yr,i)=>{
      if(i%4!==0&&i!==years.length-1) return;
      const x=PAD.l+(i/(years.length-1))*CW;
      ctx.fillStyle=yr>=2024?'rgba(246,224,94,0.65)':'rgba(126,170,210,0.4)';
      ctx.font='7.5px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(yr,x,PAD.t+CH+5);
    });
    sectors.forEach(s=>{
      ctx.globalAlpha=active.has(s.n)?1:0.1;
      ctx.strokeStyle=s.c; ctx.lineWidth=active.has(s.n)?2:1; ctx.lineJoin='round'; ctx.lineCap='round';
      ctx.beginPath();
      s.vals.forEach((v,i)=>{const x=PAD.l+(i/(years.length-1))*CW,y=PAD.t+CH-(v/maxV)*CH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke(); ctx.globalAlpha=1;
    });
  },[active]);
  return <div style={{height:'100%',overflowY:'auto',background:P.bg,padding:'18px 20px'}}>
    <div style={{maxWidth:1000,margin:'0 auto'}}>
      <div style={{fontFamily:'DM Serif Display,serif',fontSize:20,color:P.text,marginBottom:2}}>Data Observatory</div>
      <div style={{fontSize:10,color:P.text2,marginBottom:12}}>2000–2024 historical · 2025–2030 projected · Includes Gig Economy, Construction & Space sectors</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
        {sectors.map(s=>(
          <button key={s.n} onClick={()=>togS(s.n)} style={{background:active.has(s.n)?`${s.c}18`:'transparent',color:active.has(s.n)?s.c:P.text3,border:`1px solid ${active.has(s.n)?s.c:P.border}`,padding:'2px 8px',borderRadius:11,fontSize:8,fontWeight:700}}>{s.n}</button>))}
      </div>
      <div style={{background:P.card,borderRadius:10,padding:12,border:`1px solid ${P.border}`,marginBottom:12}}>
        <canvas ref={canRef} width={760} height={230} style={{width:'100%',height:'auto',display:'block',borderRadius:6}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:6}}>
        {sectors.map(s=>{const last=s.vals[s.vals.length-1],first=s.vals[0],net=((last-first)/Math.max(first,0.1)*100).toFixed(0);return(
          <div key={s.n} style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:8,padding:'9px 11px',cursor:'pointer'}} onClick={()=>togS(s.n)}>
            <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:5}}><div style={{width:6,height:6,borderRadius:'50%',background:s.c}}/><div style={{fontSize:9,fontWeight:700,color:P.text}}>{s.n}</div></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:2,textAlign:'center'}}>
              {[[first,String(years[0])],[last,String(years[years.length-1])],[net+'%','net']].map(([v,l])=>(
                <div key={l}><div style={{fontSize:11,fontWeight:700,color:s.c}}>{typeof v==='number'?v+'M':v}</div><div style={{fontSize:6.5,color:P.text3}}>{l}</div></div>))}
            </div>
          </div>);})}
      </div>
    </div>
  </div>;
}

      <div style={{fontSize:10.5,color:P.text2,marginBottom:14}}>10-year impact including gig economy disruption, construction robotics, and space industry emergence.</div>
      <div style={{background:P.card,borderRadius:9,padding:'13px 16px',border:`1px solid ${P.border}`,marginBottom:13}}>
        {data.map(r=>{const ip=r.net.startsWith('+'),val=Math.abs(parseFloat(r.net)),bw=Math.min(val/9*100,100);return(
          <div key={r.name} style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}>
            <div style={{fontSize:16,width:22,textAlign:'center'}}>{r.flag}</div>
            <div style={{width:110,fontSize:10,fontWeight:600,color:P.text,flexShrink:0}}>{r.name}</div>
            <div style={{flex:1,height:15,background:'rgba(255,255,255,0.06)',borderRadius:4,overflow:'hidden',position:'relative'}}>

        {data.map(r=>(
          <div key={r.name} style={{background:P.card,borderRadius:9,border:`1px solid ${P.border}`,overflow:'hidden'}}>
            <div style={{background:`${r.col}0c`,padding:'11px 14px',borderBottom:`1px solid ${r.col}18`}}>
              <div style={{fontFamily:'DM Serif Display,serif',fontSize:14,color:P.text}}>{r.flag} {r.name}</div>

            <div style={{padding:'9px 14px'}}>
              {r.shocks.map((s,i)=>{const ip=s.imp>=0;return(
                <div key={i} style={{display:'flex',gap:9,marginBottom:6,paddingBottom:6,borderBottom:`1px solid ${P.border2}`}}>
                  <div style={{flexShrink:0,width:60}}><div style={{fontSize:7.5,fontWeight:700,color:r.col}}>{s.yr}</div><div style={{fontSize:12,fontWeight:700,color:ip?P.green:P.red,lineHeight:1}}>{ip?'+':''}{s.imp}%</div><div style={{fontSize:7.5,color:P.text3}}>{s.j}M jobs</div></div>
                  <div style={{flex:1,fontSize:9,color:P.text2,lineHeight:1.65}}><strong style={{color:P.text,display:'block',marginBottom:1}}>{s.l}</strong></div>
                </div>);})}
            </div>
            <div style={{padding:'0 14px 9px'}}>
              {r.countries.map(ct=>(
                <div key={ct.n} style={{display:'flex',gap:7,alignItems:'center',padding:'3px 0',borderTop:`1px solid ${P.border2}`}}>

                  <span style={{fontSize:10,fontWeight:600,color:P.text,flex:1}}>{ct.n}</span>

                </div>))}
            </div>
          </div>))}
      </div>
    </div>
  </div>;
}

function ConflictTab(){

    {sev:'Critical',col:'#fc8181',icon:'☢️',title:'AI Weapons & Autonomous Military',sub:'US · China · Russia',prob:'85%',body:'Autonomous lethal weapons race accelerates faster than governance. AI-enabled systems make kill decisions in milliseconds. Every displaced worker in a weak state is a potential recruit for non-state actors deploying open-source AI weapons.',fps:['Taiwan Strait: response times compress below human judgment speed','Drone swarms deployable by non-state actors using free AI tools','Nuclear early-warning: AI false-positive risk is catastrophic'],mit:'International AI weapons convention. Human control mandates in military procurement.'},
    {sev:'Critical',col:'#fc8181',icon:'🌊',title:'Climate Migration + Gig & Construction Collapse',sub:'Sahel · South Asia · Gulf States',prob:'78%',body:'AI displaces Gulf construction workers (10M Africans/South Asians) exactly as climate makes home regions uninhabitable. Robotic construction eliminates migrant construction work. No safety net, no return economy.',fps:['Gulf: robotic construction replaces 3M migrant workers by 2031','Bangladesh: RMG automation + sea level rise = 40M displacement by 2050','Sahel: climate collapse + no gig economy safety net = state failure'],mit:'Managed migration pathways. Construction apprenticeship investment in sending countries.'},
    {sev:'Critical',col:'#fc8181',icon:'🤖',title:'AI Disinformation & Democratic Erosion',sub:'Global — every democracy',prob:'90%+',body:'Economic anxiety from gig and construction displacement is weaponised by AI-targeted disinformation into ethnic nationalism. Happening now at scale.',fps:['Election manipulation: AI content outpaces fact-checkers 100:1','Displaced gig workers are most algorithmically vulnerable to radicalisation','Synthetic atrocity footage used to justify military escalation'],mit:'Content provenance standards. Gig worker income security reduces political vulnerability.'},
    {sev:'High',col:'#f6ad55',icon:'🚀',title:'Space Race — Military & Commercial Tension',sub:'US · China · EU · UAE',prob:'70%',body:'Commercial space is the fastest-growing job sector AND most contested geopolitical frontier simultaneously. Starlink\'s role in Ukraine made satellite infrastructure military-critical.',fps:['Orbital weapons: direct-ascent ASAT capabilities expanding in 4 countries','Lunar resources: no agreed legal framework — first-mover advantage race','Starlink/OneWeb: global internet control is a military dependency'],mit:'Artemis Accords expansion. UN COPUOS reform to cover commercial operators.'},
    {sev:'High',col:'#f6ad55',icon:'🏚️',title:'Domestic Unrest: Gig & Construction Displacement',sub:'US · India · Brazil · Nigeria',prob:'65%',body:'The gig economy absorbs displaced workers. When AI displaces gig workers, there is no absorber left. Construction displacement will hit the global working class hardest — 200M workers with no alternative prepared.',fps:['US: rideshare + delivery automation hits 5M in 5 years','India: 60M construction workers facing robotic competition by 2032','West Africa: motorcycle taxi bans + AI delivery = zero income, radicalisation'],mit:'UBI pilots. Apprenticeship scaling for AI-resistant trades. Drone operator retraining for gig workers.'},
  ];
  return <div style={{height:'100%',overflowY:'auto',background:P.bg,padding:'18px 20px'}}>
    <div style={{maxWidth:860,margin:'0 auto'}}>
      <div style={{fontFamily:'DM Serif Display,serif',fontSize:22,color:P.text,marginBottom:3}}>Impending Conflict Vectors</div>
      <div style={{fontSize:10.5,color:P.text2,marginBottom:14,lineHeight:1.7}}>AI displacement, gig economy collapse, construction robotics, space militarisation, and climate migration as geopolitical triggers.</div>
      {items.map((cf,i)=>(
        <div key={i} style={{background:P.card,borderRadius:10,border:`1px solid ${cf.col}22`,marginBottom:8,overflow:'hidden'}}>
          <div style={{display:'flex',gap:11,alignItems:'flex-start',padding:'13px 15px',cursor:'pointer'}} onClick={()=>setExp(exp===i?null:i)}>
            <div style={{fontSize:22,flexShrink:0}}>{cf.icon}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <span style={{background:`${cf.col}14`,color:cf.col,border:`1px solid ${cf.col}30`,padding:'1px 6px',borderRadius:7,fontSize:7.5,fontWeight:700,textTransform:'uppercase'}}>{cf.sev}</span>
                <span style={{fontSize:8,color:P.text3}}>{cf.sub}</span>
              </div>
              <div style={{fontFamily:'DM Serif Display,serif',fontSize:14,color:P.text,marginBottom:1}}>{cf.title}</div>
              <div style={{fontSize:9,color:P.text3}}>Likelihood: <strong style={{color:cf.col}}>{cf.prob}</strong></div>
            </div>
            <div style={{fontSize:9,color:P.text3,transform:exp===i?'rotate(90deg)':'none',transition:'0.2s',flexShrink:0}}>▶</div>
          </div>
          {exp===i&&<div style={{padding:'0 15px 13px',borderTop:`1px solid ${cf.col}14`}}>
            <div style={{fontSize:10,color:P.text2,lineHeight:1.8,marginTop:10,marginBottom:10}}>{cf.body}</div>
            {cf.fps.map((f,j)=><div key={j} style={{display:'flex',gap:6,marginBottom:4,fontSize:9.5,color:P.text3,lineHeight:1.6}}><span style={{color:cf.col,flexShrink:0}}>⚡</span>{f}</div>)}
            <div style={{marginTop:9,padding:'8px 11px',background:`${cf.col}0c`,borderRadius:7,borderLeft:`3px solid ${cf.col}`}}>
              <div style={{fontSize:7.5,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:P.green,marginBottom:2}}>Mitigation Path</div>
              <div style={{fontSize:9.5,color:P.text2,lineHeight:1.7}}>{cf.mit}</div>
            </div>
          </div>}
        </div>))}
    </div>
  </div>;
}

  const opp=[
    {icon:'🚀',t:'Space Industry (All Levels)',g:'+410%',tl:'2025–2040',s:'$45–200K',d:'The fastest-growing physical-world job sector. SpaceX alone employs 12K. Covers everything from launch technicians and satellite engineers to space tourism guides and orbital habitat specialists.',sk:['FAA A&P Licence','Aerospace Tech AAS','BS Aerospace Eng','Mission Ops Training']},
    {icon:'🦾',t:'Construction Technology',g:'+280%',tl:'2026–2035',s:'$55–110K',d:'Construction doesn\'t disappear — it mechanises. Robot operators, BIM specialists, and drone surveyors replace labourers but command higher wages. Must be on-site. Cannot be offshored.',sk:['BIM/Revit Cert','FAA Part 107','Robot Operation','Structural AI Tools']},
    {icon:'🤖',t:'AI/ML Engineering',g:'+340%',tl:'Now',s:'$70–250K',d:'The engine of the whole transition. Highest-leverage investment in the job market. Accessible without a degree if portfolio is strong.',sk:['Python / PyTorch','fast.ai / HuggingFace','Prompt Engineering','MLOps / LLMOps']},
    {icon:'🚁',t:'Drone Operations & Logistics',g:'+220%',tl:'2025–2030',s:'$55–95K',d:'Delivery, agriculture, construction inspection, emergency response. FAA Part 107 is the gateway credential — 2–4 weeks to obtain. Strongest gig-worker transition path.',sk:['FAA Part 107','FAA Part 135','Fleet Management','GIS/Mapping']},

    {icon:'🏥',t:'Human Care Roles',g:'+200%',tl:'Now–2040',s:'$38–100K',d:'Elder care, mental health, disability support, and complex medical care. AI amplifies but cannot replace trust, physical presence, and human judgment. Demand grows as displacement creates mental health crisis.',sk:['CNA Certification','LPN Programme','Mental Health Cert','Palliative Spec.']},
    {icon:'🎨',t:'Premium Human Creativity',g:'+85%',tl:'2027–2035',s:'$35–300K',d:'AI floods market with average content — authentic human voice, bespoke craft, and live experience become luxury goods. Top tier earns more as the mid-tier collapses.',sk:['Craft Mastery','Personal Brand','Live Performance','Expert Niche Voice']},
  ];
  return <div style={{height:'100%',overflowY:'auto',background:P.bg,padding:'18px 22px'}}>

      <div style={{fontSize:10.5,color:P.text2,marginBottom:16,lineHeight:1.8}}>From space technicians to drone fleet managers to clean energy builders — the jobs emerging from this transition are broader and more physical than the last wave. Many don't require a four-year degree.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10,marginBottom:14}}>
        {opp.map((o,i)=>(
          <div key={i} onClick={()=>setSel(sel===i?null:i)} style={{background:P.card,borderRadius:10,border:`2px solid ${sel===i?P.sky:P.border}`,padding:'13px 15px',cursor:'pointer',transition:'all 0.15s',boxShadow:sel===i?`0 4px 20px ${P.skyGlow}`:'none'}}>

              <span style={{fontSize:21}}>{o.icon}</span>
              <span style={{background:'rgba(104,211,145,0.12)',color:P.green,border:'1px solid rgba(104,211,145,0.25)',padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:700}}>{o.g}</span>
            </div>
            <div style={{fontFamily:'DM Serif Display,serif',fontSize:13,color:P.text,marginBottom:3}}>{o.t}</div>
            <div style={{fontSize:9.5,color:P.text2,lineHeight:1.65,marginBottom:sel===i?8:0}}>{o.d}</div>
            {sel===i&&<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:8}}>
                {[['Timeline',o.tl,P.text],[`Salary`,o.s,P.green]].map(([l,v,c])=>(
                  <div key={l} style={{background:P.card2,borderRadius:6,padding:'6px 8px'}}>
                    <div style={{fontSize:6.5,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:P.text3,marginBottom:1}}>{l}</div>

        <div style={{fontSize:10.5,color:P.text2,lineHeight:1.9}}>
          Space, construction technology, climate, drone logistics, and care roles are all high-dignity, high-demand jobs that can absorb hundreds of millions of displaced workers — <strong style={{color:P.text}}>if apprenticeship and vocational training infrastructure is funded at scale alongside the AI investment</strong>. The choice is not between AI and people. It is between investing in transition or paying for the consequences of not doing so.
        </div>

/* ─── STAT PILL ─────────────────────────────────────────────────────── */
function Stat({label,value,color,tip}){
  const [show,setShow]=useState(false);
  return <div style={{position:'relative',textAlign:'center',padding:'0 10px',borderRight:`1px solid ${P.border}`}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
    <div style={{fontSize:7,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:P.text3,display:'flex',alignItems:'center',gap:3,justifyContent:'center'}}>
      {label}
      <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:10,height:10,borderRadius:'50%',background:`${P.sky}15`,color:P.sky,fontSize:7.5,cursor:'help'}}>?</span>
    </div>
    <div style={{fontSize:15,fontWeight:700,color,marginTop:1,letterSpacing:'-0.5px'}}>{value}</div>
    {show&&<div style={{position:'absolute',top:'calc(100% + 7px)',left:'50%',transform:'translateX(-50%)',width:200,background:P.card2,color:P.text2,fontSize:9.5,lineHeight:1.7,padding:'9px 11px',borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,0.7)',zIndex:9999,border:`1px solid ${P.border}`,pointerEvents:'none',textAlign:'left'}}>
      <div style={{position:'absolute',top:-5,left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderBottom:`5px solid ${P.card2}`}}/>
      {tip}
    </div>}
  </div>;
}

/* ─── APP ROOT ──────────────────────────────────────────────────────── */
const TABS=[['globe','🌐 Globe'],['radar','🎯 Job Radar'],['nation','👥 Nations'],['data','📊 Observatory'],['gdp','📉 GDP'],['geo','⚔️ Conflict'],['hope','🌱 Opportunity']];

function App(){
  const [year,setYear]=useState(2025);
  const [tab,setTab]=useState('globe');
  const [selId,setSelId]=useState(null);
  const [hovId,setHovId]=useState(null);
  const [playing,setPlaying]=useState(false);
  const playRef=useRef(null);

  const togglePlay=()=>{
    if(playing){clearInterval(playRef.current);setPlaying(false);}
    else{
      setPlaying(true);
      let y=year>=2035?2025:year;
      if(year>=2035)setYear(2025);
      playRef.current=setInterval(()=>{y+=1;if(y>2035){clearInterval(playRef.current);setPlaying(false);return;}setYear(y);},1200);
    }
  };
  useEffect(()=>()=>clearInterval(playRef.current),[]);

  const totals=Object.values(REGIONS).reduce((a,r)=>{
    const yr=r.yearly[year];
    return{d:a.d+yr.displaced,n:a.n+yr.newRoles,r:a.r+yr.risk,c:a.c+1};
  },{d:0,n:0,r:0,c:0});

  return <div style={{height:'100vh',display:'flex',flexDirection:'column',background:P.bg,overflow:'hidden',fontFamily:'DM Sans,system-ui,sans-serif'}}>
    {/* TOP BAR */}
    <div style={{background:'rgba(4,13,26,0.98)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${P.border}`,padding:'7px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0,flexWrap:'wrap',boxShadow:'0 2px 24px rgba(0,0,0,0.5)',zIndex:50}}>
      <div style={{flexShrink:0}}>
        <div style={{fontFamily:'DM Serif Display,Georgia,serif',fontSize:14,color:P.text,lineHeight:1.2}}>Earth Workforce Evolution</div>
        <div style={{fontSize:8,color:P.text3,letterSpacing:'0.3px',marginTop:1}}>AI · Gig · Construction · Space · Freelance · 2025–2035</div>
      </div>
      <div style={{display:'flex',gap:0,flexShrink:0,borderLeft:`1px solid ${P.border}`,paddingLeft:12}}>
        <Stat label="Roles Disrupted" value={`${totals.d.toFixed(1)}M`} color={P.red} tip={<><strong style={{color:P.text,display:'block',fontSize:8.5,marginBottom:2}}>Roles Disrupted</strong>Workers whose job functions are substantially automated — back-office, gig delivery, construction labour, and more.</>}/>
        <Stat label="New Roles" value={`${totals.n.toFixed(1)}M`} color={P.green} tip={<><strong style={{color:P.text,display:'block',fontSize:8.5,marginBottom:2}}>New Roles Created</strong>Emerging categories: AI engineering, space tech, drone ops, climate work, construction robotics, gig platform management.</>}/>
        <Stat label="Gap" value={`−${(totals.d-totals.n).toFixed(1)}M`} color={P.orange} tip={<><strong style={{color:P.text,display:'block',fontSize:8.5,marginBottom:2}}>Transition Gap</strong>Displaced minus created — the policy challenge. Negative = displacement outpacing creation.</>}/>
        <Stat label="Avg Exposure" value={`${Math.round(totals.r/totals.c)}%`} color={P.sky} tip={<><strong style={{color:P.text,display:'block',fontSize:8.5,marginBottom:2}}>Automation Exposure</strong>Average % of back-office tasks technically automatable by AI across all 9 regions tracked.</>}/>
      </div>
      <div style={{flex:1,minWidth:200}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
          <span style={{fontSize:7.5,color:P.text3}}>Year</span>
          <span style={{fontSize:14,fontWeight:700,color:P.sky,letterSpacing:'1px',fontVariantNumeric:'tabular-nums'}}>{year}</span>
          <button onClick={togglePlay} style={{background:playing?'rgba(252,129,129,0.12)':P.skyGlow,color:playing?P.red:P.sky,border:`1px solid ${playing?P.red:P.sky}`,padding:'3px 10px',fontSize:9,fontWeight:700,borderRadius:5}}>{playing?'■ Stop':'▶ Play'}</button>
        </div>
        <input type="range" min={2025} max={2035} value={year} onChange={e=>setYear(+e.target.value)} style={{accentColor:P.sky}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:7,color:P.text3,marginTop:1}}>
          {[2025,2027,2029,2031,2033,2035].map(y=><span key={y} style={{color:y===year?P.sky:P.text3,fontWeight:y===year?700:400}}>{y}</span>)}
        </div>
      </div>
    </div>

    {/* TAB BAR */}
    <div style={{background:'rgba(4,13,26,0.95)',borderBottom:`1px solid ${P.border}`,display:'flex',padding:'0 12px',flexShrink:0,overflowX:'auto',zIndex:40}}>
      {TABS.map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{background:'transparent',border:'none',borderBottom:`2px solid ${tab===t?P.sky:'transparent'}`,padding:'7px 12px',fontSize:9.5,fontWeight:tab===t?700:500,color:tab===t?P.sky:P.text3,whiteSpace:'nowrap',flexShrink:0,marginBottom:-1,transition:'color 0.15s'}}>{l}</button>)}
    </div>

    {/* CONTENT AREA */}
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
      {tab==='globe'&&
        <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
          <div style={{width:190,borderRight:`1px solid ${P.border}`,flexShrink:0,overflow:'hidden'}}><LeftPanel year={year}/></div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 48% 42%,#040e20 0%,#020a14 65%)',overflow:'hidden',position:'relative',minWidth:0}}>
            <div style={{width:'min(470px,88%)',height:'min(470px,88%)'}}>
              <GlobeCanvas year={year} selId={selId} hovId={hovId} onSelect={setSelId} onHover={setHovId}/>
            </div>
            <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',background:'rgba(4,13,26,0.82)',backdropFilter:'blur(10px)',padding:'4px 14px',borderRadius:20,fontSize:8.5,color:P.text3,border:`1px solid ${P.border}`,pointerEvents:'none',whiteSpace:'nowrap'}}>
              🌍 Drag to rotate · Click a spike to inspect a region
            </div>
          </div>
          <div style={{width:235,borderLeft:`1px solid ${P.border}`,flexShrink:0,overflow:'hidden'}}><RightPanel year={year} selId={selId} hovId={hovId}/></div>
        </div>}
      {tab==='radar'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><JobRadar/></div>}
      {tab==='nation'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><NationImpact/></div>}
      {tab==='data'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><DataTab/></div>}
      {tab==='gdp'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><GdpTab/></div>}
      {tab==='geo'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><ConflictTab/></div>}
      {tab==='hope'&&<div style={{flex:1,overflow:'hidden',minHeight:0}}><HopeTab/></div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
