function topBar(){
  var totD=0,totN=0,totR=0,totC=0;
  Object.keys(REG).forEach(function(k){var y=REG[k].y[YEAR];totD+=y.d;totN+=y.n;totR+=y.risk;totC++;});
  var bar=mk("div","background:#040d1a;border-bottom:1px solid #112035;padding:7px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0");
  var title=mk("div","flex-shrink:0");
  title.innerHTML="<div style='font-size:15px;font-weight:700;color:#dceeff'>Earth Workforce Evolution</div><div style='font-size:9px;color:#3d6a8a'>AI | Gig | Construction | Space | Freelance | 2025-2035</div>";
  bar.appendChild(title);
  var stats=mk("div","display:flex;gap:0;flex-shrink:0;border-left:1px solid #112035;padding-left:14px");
  function stat(label,val,col,tip){
    var s=mk("div","position:relative;text-align:center;padding:0 11px;border-right:1px solid #112035");
    s.innerHTML="<div style='font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#3d6a8a'>"+label+"</div><div style='font-size:15px;font-weight:700;color:"+col+"'>"+val+"</div>";
    var tt=mk("div","position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);width:190px;background:#091d30;color:#7faac8;font-size:10px;line-height:1.7;padding:9px 11px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.8);z-index:9999;border:1px solid #112035;pointer-events:none;text-align:left;display:none");
    tt.textContent=tip;s.appendChild(tt);
    s.addEventListener("mouseenter",function(){tt.style.display="block";});
    s.addEventListener("mouseleave",function(){tt.style.display="none";});
    return s;
  }
  stats.appendChild(stat("Disrupted",totD.toFixed(1)+"M","#fc8181","Workers whose jobs are substantially automated - back-office, gig, construction."));
  stats.appendChild(stat("New Roles",totN.toFixed(1)+"M","#68d391","Emerging jobs: AI engineering, space tech, drone ops, clean energy, construction robotics."));
  stats.appendChild(stat("Gap","-"+(totD-totN).toFixed(1)+"M","#f6ad55","Displaced minus created - the policy challenge."));
  stats.appendChild(stat("Avg Risk",Math.round(totR/totC)+"%","#63b3ed","Average automation exposure across all 9 regions."));
  bar.appendChild(stats);

  var top2=mk("div","display:flex;justify-content:space-between;align-items:center;margin-bottom:3px");
  var yl=mk("span","font-size:8px;color:#3d6a8a");yl.textContent="Year";
  var yn=mk("span","font-size:14px;font-weight:700;color:#63b3ed;letter-spacing:1px");yn.textContent=YEAR;
  var pb=mk("button","background:"+(PLAYING?"rgba(252,129,129,0.12)":"rgba(99,179,237,0.1)")+";color:"+(PLAYING?"#fc8181":"#63b3ed")+";border:1px solid "+(PLAYING?"#fc8181":"#63b3ed")+";padding:3px 10px;font-size:9px;font-weight:700;border-radius:5px");
  pb.textContent=PLAYING?"Stop":"Play";pb.onclick=togglePlay;
  top2.appendChild(yl);top2.appendChild(yn);top2.appendChild(pb);sw.appendChild(top2);
  var inp=document.createElement("input");
  inp.type="range";inp.min=2025;inp.max=2035;inp.value=YEAR;inp.style.width="100%";

function togglePlay(){

  PLAYING=true;var y=YEAR>=2035?2025:YEAR;if(YEAR>=2035)YEAR=2025;

}

// GLOBE - Leaflet.js real-world map with satellite tiles + country dots
var LEAF_MAP = null;
var LEAF_MARKERS = [];
var LEAF_LAYERS = {};

function initLeafletMap(){
  if(!document.getElementById('leafmap')) return;
  if(LEAF_MAP){LEAF_MAP.invalidateSize();return;}

  // Init Leaflet map
  LEAF_MAP = L.map('leafmap', {
    center: [20, 10],
    zoom: 2,
    zoomControl: true,
    attributionControl: true,
    minZoom: 1,
    maxZoom: 12
  });

  // Satellite layer (ESRI World Imagery - real satellite like Google Earth)
  var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
    maxZoom: 19
  });

  // Labels overlay (country/city names on top of satellite)
  var labels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    attribution: '',
    maxZoom: 19,
    opacity: 0.85
  });

  // OpenStreetMap as fallback option
  var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  });

  satellite.addTo(LEAF_MAP);
  labels.addTo(LEAF_MAP);

  LEAF_LAYERS = {satellite: satellite, labels: labels, osm: osm};

  // Add layer control
  L.control.layers(
    {'Satellite (ESRI)': satellite, 'Street Map': osm},
    {'Country Labels': labels}
  ).addTo(LEAF_MAP);

  plotCountryMarkers();
}

function plotCountryMarkers(){
  if(!LEAF_MAP) return;
  // Clear old
  LEAF_MARKERS.forEach(function(m){LEAF_MAP.removeLayer(m);});
  LEAF_MARKERS = [];

  ALL_COUNTRIES.forEach(function(ct){
    var risk = ct.y[YEAR]||0;
    var col = risk>=85?'#fc8181':risk>=70?'#f6ad55':risk>=55?'#f6e05e':risk>=40?'#68d391':'#48bb78';
    var r = risk>=70?10:risk>=50?7:risk>=30?5:3;
    var isActive = SEL_COUNTRY && SEL_COUNTRY.n===ct.n;

    var circle = L.circleMarker([ct.la, ct.lo], {
      radius: isActive ? r*1.8 : r,
      fillColor: col,
      color: isActive ? '#fff' : col,
      weight: isActive ? 2 : 0.5,
      opacity: isActive ? 1 : 0.85,
      fillOpacity: isActive ? 1 : 0.72
    });

    var popHTML = '<div style="font-family:monospace;background:#040d1a;color:#dceeff;border:1px solid '+col+';border-radius:8px;padding:10px 14px;min-width:180px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:4px">'+ct.n+'</div>'
      +'<div style="font-size:9px;color:#3d6a8a;margin-bottom:6px">'+ct.pop+' &nbsp;|&nbsp; GDP: '+ct.gdp+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'
      +'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+col+'"></span>'
      +'<span style="font-size:11px;font-weight:700;color:'+col+'">'+risk+'% risk &mdash; '+YEAR+'</span>'
      +'</div>'
      +'<div style="height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:6px">'
      +'<div style="height:100%;width:'+risk+'%;background:'+col+';border-radius:2px"></div></div>'
      +'<div style="font-size:9px;color:#7faac8;line-height:1.6">'+ct.key+'</div>'
      +'<div style="margin-top:6px;font-size:8.5px;color:#3d6a8a;text-align:center">Click dot to view full profile</div>'
      +'</div>';

    circle.bindPopup(popHTML, {
      className: 'dark-popup',
      maxWidth: 240
    });

    circle.on('click', function(){
      SEL_COUNTRY = ct; SEARCH_Q = '';
      var rp = document.querySelector('[data-rp]');
      if(rp){ rp.innerHTML=''; rp.appendChild(rightPanel()); }
      plotCountryMarkers();
    });

    circle.addTo(LEAF_MAP);
    LEAF_MARKERS.push(circle);
  });
}

// Global helper for popup button
window._selectCt = function(name){
  var ct = COUNTRY_BY_NAME[name.toLowerCase()];
  if(ct){ SEL_COUNTRY=ct; SEARCH_Q='';
    var rp=document.querySelector('[data-rp]');
    if(rp){rp.innerHTML='';rp.appendChild(rightPanel());}
    LEAF_MAP && LEAF_MAP.closePopup();
    plotCountryMarkers();

function startGlobe(){

}

  // Canvas chart draw functions
  function drawLineChart(can,years,metric){
    var ctx=can.getContext('2d'),W=can.width,H=can.height;
    var PAD={t:20,r:20,b:28,l:44};var CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#071525';ctx.fillRect(0,0,W,H);
    // Grid

      });
      ctx.stroke();
      // Dots
      years.forEach(function(y,idx){

        var x=PAD.l+(idx/(years.length-1||1))*CW;
        var yy=PAD.t+CH-(v/100)*CH;
        ctx.beginPath();ctx.arc(x,yy,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      });
    });
    // X labels
    years.forEach(function(y,idx){
      if(years.length<=6||idx%2===0||idx===years.length-1){
        var x=PAD.l+(idx/(years.length-1||1))*CW;
        ctx.fillStyle='rgba(126,170,210,0.5)';ctx.font='7.5px monospace';ctx.textAlign='center';ctx.textBaseline='top';
        ctx.fillText(y,x,PAD.t+CH+5);
      }
    });
    // Legend
    CMP_SEL.forEach(function(ct,i){
      var col=CMP_COLORS[i];
      ctx.fillStyle=col;ctx.fillRect(PAD.l+i*100,4,18,3);
      ctx.fillStyle='rgba(220,238,255,0.75)';ctx.font='7.5px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(ct.n,PAD.l+i*100+22,5.5);
    });
  }

  function drawBarChart(can,years){
    var ctx=can.getContext('2d'),W=can.width,H=can.height;
    var PAD={t:16,r:16,b:24,l:44};var CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#071525';ctx.fillRect(0,0,W,H);
    for(var gi=0;gi<=4;gi++){
      var gy=PAD.t+CH-gi/4*CH;
      ctx.strokeStyle='rgba(99,179,237,0.06)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD.l,gy);ctx.lineTo(PAD.l+CW,gy);ctx.stroke();
      ctx.fillStyle='rgba(126,170,210,0.45)';ctx.font='7px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillText((gi/4*100).toFixed(0)+'%',PAD.l-4,gy);
    }
    var n=CMP_SEL.length;var bw=Math.min(60,CW/(n+2));var gap=bw*0.3;
    var totalW=n*(bw+gap)-gap;var startX=PAD.l+(CW-totalW)/2;
    CMP_SEL.forEach(function(ct,i){
      var col=CMP_COLORS[i];
      var avg=Math.round(years.reduce(function(s,y){return s+(ct.y[y]||0);},0)/years.length);
      var x=startX+i*(bw+gap);
      var bh=(avg/100)*CH;
      var grad=ctx.createLinearGradient(x,PAD.t+CH-bh,x,PAD.t+CH);
      grad.addColorStop(0,col);grad.addColorStop(1,col+'44');
      ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(x,PAD.t+CH-bh,bw,bh,3);ctx.fill();
      ctx.fillStyle='rgba(220,238,255,0.8)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(avg+'%',x+bw/2,PAD.t+CH-bh-3);
      ctx.fillStyle=col;ctx.font='7px Arial';ctx.textAlign='center';ctx.textBaseline='top';
      var maxW=bw+gap-2;var name=ct.n;
      if(ctx.measureText(name).width>maxW)name=name.split(' ')[0];
      ctx.fillText(name,x+bw/2,PAD.t+CH+4);
    });
  }

  return wrap;
}

  var t=mk("div","font-size:21px;font-weight:700;color:#dceeff;margin-bottom:4px");t.textContent="The Opportunity Ahead";wrap.appendChild(t);
  var sb=mk("div","font-size:11px;color:#7faac8;margin-bottom:20px;line-height:1.7;max-width:640px");sb.textContent="Every technological revolution has created more jobs than it destroyed - eventually. The difference this time is whether we build the bridges fast enough. Here is the genuine case for optimism.";wrap.appendChild(sb);
  var items=[
    {col:"#68d391",title:"Space Economy: 1.8 Trillion by 2035",sub:"$1.8T projected | 400K+ new US jobs | Global participation",body:"The space economy is the most concrete new sector emerging at scale. SpaceX Starship enables rapid satellite deployment, lunar logistics, and eventually Mars. Blue Origin, Rocket Lab, and 600+ startups are creating supply chains that need technicians, operators, engineers, and support workers. The skills pipeline is opening at community colleges and trade schools - not just MIT.",wins:["SpaceX Starship: full reusability makes space access cost-competitive","Axiom Space: commercial space station opens 2026 - first privately operated jobs in orbit","Moon to Mars: NASA Artemis creates construction and operations jobs in the 2030s","Satellite internet: Starlink and OneWeb connecting 3B people who cannot currently access gig economy platforms"]},
    {col:"#4fd1c5",title:"Clean Energy: 38 Million Jobs by 2030",sub:"IEA projection | Cannot be offshored | Trade skill pathway",body:"The International Energy Agency projects 38M clean energy jobs globally by 2030 - more than the entire fossil fuel sector today. Solar, wind, battery storage, EV charging, and building efficiency are physical work that cannot be automated or offshored. The training pathway is 2-4 weeks for entry level to 4 years for engineers - accessible at every education level.",wins:["Solar: fastest-growing energy source globally, LCOE now below coal in every market","Wind: offshore wind platforms create permanent operations jobs","EV transition: every ICE mechanic can retrain as EV technician in 6 months","Battery storage: grid-scale and residential storage is a decade-long installation wave"]},
    {col:"#63b3ed",title:"The Gig Economy Evolves - Does Not Die",sub:"Platforms pivot | New categories emerge | Freelance AI consultants",body:"The gig economy is disrupted, not destroyed. Delivery and rideshare decline, but new gig categories emerge: drone operations, AI consulting, trust and safety, platform moderation, elder care, and on-site construction robotics support. The difference is that new gig work requires skill certifications that provide a floor wage and career progression that commodity gig work never offered.",wins:["Drone delivery operators: transition path from delivery gig with same operational mindset","AI consulting: small business owners need human help implementing AI tools","Platform trust and safety: every platform needs human judgment for edge cases","Elder care gig: AI-resistant, high-demand, flexible scheduling matches gig worker preferences"]},
    {col:"#b794f4",title:"Construction Robotics Creates More Than It Destroys",sub:"Japan model | On-site work | Cannot be offshored",body:"Japan demonstrates the positive case: where construction robot adoption is highest, wages have risen and labour shortages are being addressed rather than exacerbated. The robot operator role is skilled, on-site, AI-resistant in itself (supervising AI is not automatable), and pays more than the manual labour it replaces. The transition infrastructure is trade apprenticeship - the most proven workforce development system in history.",wins:["Komatsu and Caterpillar: hiring machine AI supervisors at $65-85K to operate autonomous fleets","3D concrete printing: trained operators are more like architects than labourers","Drone site survey operators: construction sites are the largest single use case for commercial drones","Japan apprenticeship model: replicable in any country with functional vocational education"]}
  ];
  items.forEach(function(item){
    var card=mk("div","background:#071525;border-radius:10px;border:1px solid "+item.col+"30;margin-bottom:14px;overflow:hidden");
    var hd=mk("div","background:"+item.col+"0c;padding:12px 16px;border-bottom:1px solid "+item.col+"18");
    hd.innerHTML="<div style='font-size:8px;color:#3d6a8a;margin-bottom:3px'>"+item.sub+"</div><div style='font-size:15px;font-weight:700;color:#dceeff'>"+item.title+"</div>";
    card.appendChild(hd);
    var body4=mk("div","padding:12px 16px");
    var p=mk("div","font-size:10.5px;color:#7faac8;line-height:1.8;margin-bottom:10px");p.textContent=item.body;body4.appendChild(p);
    var wl=mk("div","background:#091d30;border-radius:8px;padding:9px 12px;border:1px solid #112035");
    wl.innerHTML="<div style='font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:"+item.col+";margin-bottom:6px'>Early Wins</div>";
    item.wins.forEach(function(w){var r=mk("div","font-size:10px;color:#7faac8;padding:2px 0;border-bottom:1px solid #0b1928");r.textContent="> "+w;wl.appendChild(r);});
    body4.appendChild(wl);card.appendChild(body4);wrap.appendChild(card);
  });
  var foot=mk("div","background:linear-gradient(135deg,#040d1a,#071525);border-radius:10px;border:1px solid #112035;padding:20px 22px;margin-top:4px");
  foot.innerHTML="<div style='font-size:17px;font-weight:700;color:#dceeff;margin-bottom:10px'>The Bottom Line</div><div style='font-size:11px;color:#7faac8;line-height:1.9;max-width:640px'>This is not the first time automation has restructured the global economy. The Industrial Revolution displaced artisans and agricultural workers. Electrification destroyed the ice trade and the gas lamp industry. Every wave of automation eventually created more jobs than it destroyed - but only because societies built the institutions: public education, trade unions, social insurance, and vocational training.<br><br><strong style='color:#dceeff'>The question is not whether AI creates opportunity. It does, and the data shows it clearly in space tech, clean energy, construction robotics, elder care, and cybersecurity. The question is whether we build the transition infrastructure fast enough for the people who cannot wait a decade for the new equilibrium to emerge.</strong></div>";
  wrap.appendChild(foot);return wrap;
}

// START
redraw();
</script>
</body>
</html>
