    {col:"#4fd1c5",title:"Clean Energy: 38 Million Jobs by 2030",sub:"IEA projection | Cannot be offshored | Trade skill pathway",body:"The International Energy Agency projects 38M clean energy jobs globally by 2030 - more than the entire fossil fuel sector today. Solar, wind, battery storage, EV charging, and building efficiency are physical work that cannot be automated or offshored. The training pathway is 2-4 weeks for entry level to 4 years for engineers - accessible at every education level.",wins:["Solar: fastest-growing energy source globally, LCOE now below coal in every market","Wind: offshore wind platforms create permanent operations jobs","EV transition: every ICE mechanic can retrain as EV technician in 6 months","Battery storage: grid-scale and residential storage is a decade-long installation wave"]},
    {col:"#63b3ed",title:"The Gig Economy Evolves - Does Not Die",sub:"Platforms pivot | New categories emerge | Freelance AI consultants",body:"The gig economy is disrupted, not destroyed. Delivery and rideshare decline, but new gig categories emerge: drone operations, AI consulting, trust and safety, platform moderation, elder care, and on-site construction robotics support. The difference is that new gig work requires skill certifications that provide a floor wage and career progression that commodity gig work never offered.",wins:["Drone delivery operators: transition path from delivery gig with same operational mindset","AI consulting: small business owners need human help implementing AI tools","Platform trust and safety: every platform needs human judgment for edge cases","Elder care gig: AI-resistant, high-demand, flexible scheduling matches gig worker preferences"]},
    {col:"#b794f4",title:"Construction Robotics Creates More Than It Destroys",sub:"Japan model | On-site work | Cannot be offshored",body:"Japan demonstrates the positive case: where construction robot adoption is highest, wages have risen and labour shortages are being addressed rather than exacerbated. The robot operator role is skilled, on-site, AI-resistant in itself (supervising AI is not automatable), and pays more than the manual labour it replaces. The transition infrastructure is trade apprenticeship - the most proven workforce development system in history.",wins:["Komatsu and Caterpillar: hiring machine AI supervisors at $65-85K to operate autonomous fleets","3D concrete printing: trained operators are more like architects than labourers","Drone site survey operators: construction sites are the largest single use case for commercial drones","Japan apprenticeship model: replicable in any country with functional vocational education"]}

  foot.innerHTML="<div style='font-size:17px;font-weight:700;color:#dceeff;margin-bottom:10px'>The Bottom Line</div><div style='font-size:11px;color:#7faac8;line-height:1.9;max-width:640px'>This is not the first time automation has restructured the global economy. The Industrial Revolution displaced artisans and agricultural workers. Electrification destroyed the ice trade and the gas lamp industry. Every wave of automation eventually created more jobs than it destroyed - but only because societies built the institutions: public education, trade unions, social insurance, and vocational training.<br><br><strong style='color:#dceeff'>The question is not whether AI creates opportunity. It does, and the data shows it clearly in space tech, clean energy, construction robotics, elder care, and cybersecurity. The question is whether we build the transition infrastructure fast enough for the people who cannot wait a decade for the new equilibrium to emerge.</strong></div>";
